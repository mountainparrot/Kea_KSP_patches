// adds the S1.5400 / 11D33 for Molniya
// completely made up SL isp values btw
+PART[liquidEngine3_v2]:NEEDS[ReStock,Waterfall]:AFTER[000_ReStock]
{
	@name = kea_engine_s1_5400
	@rescaleFactor,* = 0.75 // 1.25 => 0.9375 (also the Terrier has 2 rescaleFactors for some reason)
	
	@title = S1.5400 "Lynnedslag" Rocket Engine
	@description = test
	@tags = molniya s1?5400 soyuz vos* luna zond venera
	@mass = 0.1
	@bulkheadProfiles = size0p5
	
	%VABORGANIZER:NEEDS[VABOrganizer]
	{
		%organizerSubcategory = lfoEngines
	}
	
	@MODULE[ModuleEnginesFX]
	{
		@maxThrust = 15.93 // 25% irl (63.7 kN)
		
		!atmosphereCurve {}
        atmosphereCurve
        {
            key = 0 338.88
            key = 1 167
			key = 5 0.001
        }
	}
	
	!MODULE[ModuleTestSubject] {}
	
	!EFFECTS {}
	EFFECTS
	{
		fx-terrier-running
		{
			AUDIO
            {
                channel = Ship
                clip = TantaresLV/sounds/sound_rocket_normal
                volume = 0.0 0.0
                volume = 0.1 1.0
                volume = 1.0 1.0
                pitch = 0.0 1.0
                pitch = 1.0 1.0
                loop = true
            }
		}
		engage
		{
			AUDIO
			{
				channel = Ship
				clip = sound_vent_soft
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		flameout
		{
			PREFAB_PARTICLE
			{
				prefabName = fx_exhaustSparks_flameout_2
				transformName = thrustTransform
				oneShot = true
			}
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		disengage
		{
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 0.8
				loop = false
			}
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = 11D33_engineFX
		engineID = basicEngine

		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
			responseRateUp = 0.005
			responseRateDown = 0.1
		}
		CONTROLLER
		{
			name = random
			linkedTo = random
			range = 0,1
		}
		// -----------------------------------------------------
		// Past here should be generated with the ingame editor!
		// ------
		TEMPLATE
		{
			templateName = waterfall-kerolox-upper-3
			overrideParentTransform = thrustTransform
			position = 0,0,0.108
			rotation = 0, 0, 0
			scale = 0.67, 0.67, 0.67
		}
	}
	
	@MODULE[ModulePartVariants]{
		@baseVariant = Compact
	}
	
	MODULE
	{
		name = ModuleB9PartSwitch
		switcherDescription = Engine Config
		switcherDescriptionPlural = Engine Configs
		moduleID = engineSwitch
		SUBTYPE
		{
			name = S1_5400
			title = S1.5400
			descriptionSummary = Used on Molniya Blok-L.
			descriptionDetail = <b>Thrust:</b> 7.85 kN ASL / 15.93 kN Vac.\n<b>Isp:</b> 167 s ASL / 338.88 s Vac.
			defaultSubtypePriority = 10
		}
		
		SUBTYPE
		{
			name = 11D33
			title = S1.5400A (11D33)
			descriptionSummary = Used on Molniya-M Blok-L.
			descriptionDetail = <b>Thrust:</b> 8.33 kN ASL / 16.68 kN Vac.\n<b>Isp:</b> 170 s ASL / 340.2 s Vac.

			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
				}

				DATA
				{
					maxThrust = 16.68 // 25% irl (66.7 kN)
					atmosphereCurve
					{
						key = 0 340.2
						key = 1 170
						key = 5 0.001
					}
				}
			}
		}
		SUBTYPE
		{
			name = 11D33M
			title = S1.5400A1 (11D33M)
			descriptionSummary = Used on Molniya-M Blok-2BL.
			descriptionDetail = <b>Thrust:</b> 8.42 kN ASL / 16.83 kN Vac.\n<b>Isp:</b> 171.3 s ASL / 342.45 s Vac.

			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
				}

				DATA
				{
					maxThrust = 16.83 // 25% irl (67.3 kN)
					atmosphereCurve
					{
						key = 0 342.45
						key = 1 171.3
						key = 5 0.001
					}
				}
			}
		}
	}
}

@PART[kea_engine_s1_5400]:NEEDS[TantaresLV,EngineIgnitor]:FOR[zzzKea_configs]
{
	!MODULE[ModuleEngineIgnitor] {}
	MODULE
	{
		name = ModuleEngineIgnitor
		IgnitionsAvailable = 2
		AutoIgnitionTemperature = 500
		IgnitorType = Internal
		UseUllageSimulation = true
		ChanceWhenUnstable = 0.2
	}
}

