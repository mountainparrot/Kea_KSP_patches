// Ground-lit engines (LRBE, SSBE, STBE, SSME-35/50/69)
@PART[rmm_arenysaurus|rmm_cotopaxi|rmm_dugong|rmm_kilimanjaro|rmm_turiasaurus]:NEEDS[RocketMotorMenagerie]:AFTER[EngineIgnitor]
{	
	MODULE
	{
		name = ModuleEngineIgnitor
		IgnitionsAvailable = 0
		IgnitorType = External (Launch Clamps)
		AutoIgnitionTemperature = 800
		UseUllageSimulation = true
		ChanceWhenUnstable = 0.2
	}
}
// SSME-TMI
@PART[rmm_arsia]:NEEDS[RocketMotorMenagerie]:AFTER[EngineIgnitor]
{	
	MODULE
	{
		name = ModuleEngineIgnitor
		IgnitionsAvailable = 5 //?
		AutoIgnitionTemperature = 800
		IgnitorType = Internal
		UseUllageSimulation = true
		ChanceWhenUnstable = 0.2
	}
}
// SSME-150
@PART[rmm_ceraunius]:NEEDS[RocketMotorMenagerie]:AFTER[EngineIgnitor]
{	
	MODULE
	{
		name = ModuleEngineIgnitor
		IgnitionsAvailable = 1
		AutoIgnitionTemperature = 800
		IgnitorType = Internal
		UseUllageSimulation = true
		ChanceWhenUnstable = 0.2
	}
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[nozzleSwitch]]{
		@SUBTYPE[Altitude Start]{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEngineIgnitor
				}
				DATA
				{
					IgnitionsAvailable = 1
					IgnitionsRemained = 1
				}
			}
		}
		@SUBTYPE[Orbital Start]{
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEngineIgnitor
				}
				DATA
				{
					IgnitionsAvailable = 3
					IgnitionsRemained = 3
				}
			}
		}
	}
}
