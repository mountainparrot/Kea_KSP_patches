// RD-0210 and RD-0212 are slightly undersized
// patch made with Proton being scaled down to KSP standard sizes in mind
@PART[tantares_lv_engine_rd_0210_s0_1|tantares_lv_engine_rd_0213_s0_1]:NEEDS[TantaresLV]:FIRST{
	@rescaleFactor = 1.12
}

