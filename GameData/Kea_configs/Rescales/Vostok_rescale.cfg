// Rescales the Vostok spacecraft (and derivatives)
// doesn't alter the sphere tanks

// Reentry module
@PART[andromeda_crew_s1_1]:NEEDS[Tantares]{ // Vostok
	@rescaleFactor = 1.15
	@mass = 1.4
}
@PART[andromeda_crew_s1_2]:NEEDS[Tantares]{ // Voskhod
	@rescaleFactor = 1.15
	@mass = 1.7
}
@PART[andromeda_control_core_s1_1]:NEEDS[Tantares]{ // Zenit
	@rescaleFactor = 1.15
	@mass = 1.5
}
@PART[andromeda_parachute_s0_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.15
}

// Equipment module
@PART[andromeda_decoupler_s0p5_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
	@bulkheadProfiles = size1
	@mass = 0.05
}
@PART[andromeda_avionics_s1_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
	@bulkheadProfiles = size1p2
	@mass = 0.55
}
@PART[andromeda_engine_s1_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
	@bulkheadProfiles = size1p2
	@mass = 0.42
	
	RESOURCE
	{
		name = LiquidFuel
		amount = 17.1
		maxAmount = 17.1
	}	
	RESOURCE
	{
		name = Oxidizer
		amount = 20.9
		maxAmount = 20.9
	}
}
@PART[andromeda_gyro_s1_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
	@bulkheadProfiles = size1p2
	@mass = 0.13
}
@PART[andromeda_airlock_s0_1|andromeda_low_gain_antenna_srf_1|andromeda_engine_s0_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
}

