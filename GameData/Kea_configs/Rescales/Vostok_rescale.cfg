// Rescales the Vostok spacecraft (and derivatives) up to a more correct size 
// doesn't alter the sphere tanks

@PART[andromeda_crew_s1_?|andromeda_parachute_s0_1|andromeda_airlock_s0_1|andromeda_control_core_s1_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.15
}
@PART[andromeda_decoupler_s0p5_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
	@bulkheadProfiles = size1
}
@PART[andromeda_avionics_s1_1|andromeda_engine_s1_1|andromeda_gyro_s1_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
	@bulkheadProfiles = size1p2
}
@PART[andromeda_low_gain_antenna_srf_1|andromeda_engine_s0_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.2
}

