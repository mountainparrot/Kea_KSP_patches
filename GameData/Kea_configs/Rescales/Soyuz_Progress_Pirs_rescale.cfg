// Rescales the Soyuz and Progress spacecraft to a more correct size, Pirs as well since it would be out of place otherwise
// doesn't rescale docking ports so Bring Your Own adapter :D

// Soyuz
@PART[virgo_crew_s1_1|tantares_v2_crew_s1_1|virgo_fuel_tank_s1_?|virgo_radiator_fuel_tank_s1_?|tantares_v2_basic_fuel_tank_s1_1|tantares_v2_fuel_tank_s1_1|tantares_v2_basic_service_module_s1_1|tantares_v2_service_module_s1_1|tantares_v2_decoupler_s1_1|tantares_v2_heatshield_s1_1|tantares_v2_orbital_module_s1_4]:NEEDS[Tantares]{
	@rescaleFactor = 1.1
	@bulkheadProfiles = size1p1
}
@PART[octans_solar_srf_1_?|octans_basic_solar_srf_1_?|pavonis_solar_srf_1_?|tantares_engine_s5_60_srf_1|tantares_engine_s5_80_srf_1|tantares_v2_parachute_s0_1|octans_high_gain_antenna_srf_?|octans_star_tracker_srf_1|octans_periscope_srf_1|virgo_orbital_module_s1_1|tantares_v2_orbital_module_s1_1|tantares_v2_orbital_module_s1_2|tantares_v2_orbital_module_s1_3]:NEEDS[Tantares]{
	@rescaleFactor = 1.1
}

// Progress
@PART[hamal_avionics_s1_1|hamal_fuel_tank_s1_1|hamal_fuel_tank_s1_2|hamal_gyro_s1_1|hamal_adapter_s1_1|hamal_orbital_module_s1_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.1
	@bulkheadProfiles = size1p1
}

// Pirs
@PART[pirs_v2_interstage_s1_1|pirs_v2_adapter_s1_s0p5_1|pirs_v2_service_module_s1_1|pirs_v2_crew_s1_1]:NEEDS[Tantares]{
	@rescaleFactor = 1.1
	@bulkheadProfiles = size1p1
}

