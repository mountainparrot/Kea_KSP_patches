// Adds a white and grey texture switches to Kosmos 3
@PART[corvus_lv_fuel_tank_s1_4|corvus_lv_engine_s1_1]:NEEDS[TantaresLV]{
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = b9_colour
		switcherDescription = Colour
		SUBTYPE
		{
			name = c_default
			title = #LOC_tantares_lv_variant_tantares_lv_orange
			primaryColor = #b3b3b3
			secondaryColor = #99632e
			TEXTURE
			{
				texture = TantaresLV/parts/KOSMOS/texture_corvus_lv_general_1
				currentTexture = texture_corvus_lv_general_1
			}
		}
		SUBTYPE
		{
			name = c_white
			title = #LOC_tantares_lv_variant_tantares_lv_white
			primaryColor = #b3b3b3
			TEXTURE
			{
				texture = Kea_configs/Recolours/Kosmos/texture_corvus_lv_general_1_white
				currentTexture = texture_corvus_lv_general_1
			}
		}
		SUBTYPE
		{
			name = c_grey
			title = #LOC_tantares_lv_variant_tantares_lv_grey
			primaryColor = #595550
			TEXTURE
			{
				texture = Kea_configs/Recolours/Kosmos/texture_corvus_lv_general_1_grey
				currentTexture = texture_corvus_lv_general_1
			}
		}
	}
}
