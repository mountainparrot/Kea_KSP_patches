// Adds a grey texture switch to the RD-107/108 and fins
@PART[tantares_lv_engine_rd_107]:NEEDS[TantaresLV]{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[b9_colour]]{
		SUBTYPE
		{
			name = c_grey
			title = #LOC_tantares_lv_variant_tantares_lv_grey
			primaryColor = #595550
			TEXTURE
			{
				texture = Kea_configs/Recolours/Soyuz_v2/RD_107_Shroud_grey
				currentTexture = RD_107_Shroud
			}
      		TEXTURE
			{
				texture = Kea_configs/Recolours/Soyuz_v2/RD_108_Shroud_grey
				currentTexture = RD_108_Shroud
			}
		}
	}
}
@PART[tantares_lv_engine_rd_108]:NEEDS[TantaresLV]{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[b9_colour]]{
		SUBTYPE
		{
			name = c_grey
			title = #LOC_tantares_lv_variant_tantares_lv_grey
			primaryColor = #595550
			TEXTURE
			{
				texture = Kea_configs/Recolours/Soyuz_v2/RD_107_Shroud_grey
				currentTexture = RD_107_Shroud
			}
		}
	}
}
@PART[tantares_lv_r7_fin]:NEEDS[TantaresLV]{
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[b9_colour]]{
		SUBTYPE
		{
			name = c_grey
			title = #LOC_tantares_lv_variant_tantares_lv_grey
			primaryColor = #595550
			TEXTURE
			{
				texture = Kea_configs/Recolours/Soyuz_v2/RD_108_Shroud_grey
			}
			TEXTURE
			{
				texture = TantaresLV/parts/ANY_ENGINE/RD_107_RD_108/RD_108_Shroud_Normal
				isNormalMap = true
			}
		}
	}
}

