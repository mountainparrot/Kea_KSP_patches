// Adds a white texture switch to the Tsyklon engine mounts
@PART[berehynia_lv_engine_mount_s1p5_1|berehynia_lv_engine_mount_s1p5_2]:NEEDS[TantaresLV]{
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = b9_colour
		switcherDescription = Colour
		SUBTYPE
		{
			name = c_blue
			title = #LOC_tantares_lv_variant_tantares_lv_blue
			primaryColor = #263d4d
			TEXTURE
			{
				texture = TantaresLV/parts/ANY_STRUCTURAL/tsyklon/a3
				currentTexture = a3
			}
		}
		SUBTYPE
		{
			name = c_white
			title = #LOC_tantares_lv_variant_tantares_lv_white
			primaryColor = #b3b3b3
			TEXTURE
			{
				texture = Kea_configs/Recolours/Tsyklon/a3_tsy2
				currentTexture = a3
			}
		}
	}
}

