// Adds a red/white and full white switch to the LK nesting jets
@PART[lk_v2_rocket_motor_srf_1|lk_v2_rocket_motor_srf_2]:NEEDS[Tantares]{
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = b9_colour
		switcherDescription = Colour
		SUBTYPE
		{
			name = c_default
			title = #LOC_tantares_variant_tantares_black
			primaryColor = #333333
			TEXTURE
			{
				texture = Tantares/parts/any_nesting_jet/lk_v2/a1
				currentTexture = a1
			}
		}
		SUBTYPE
		{
			name = c_redwhite
			title = #LOC_tantares_variant_tantares_red
			primaryColor = #b3b3b3
			secondaryColor = #663333
			TEXTURE
			{
				texture = Kea_configs/Recolours/LK_v2/a1_redwhite
				currentTexture = a1
			}
		}
		SUBTYPE
		{
			name = c_white
			title = #LOC_tantares_variant_tantares_white
			primaryColor = #b3b3b3
			TEXTURE
			{
				texture = Kea_configs/Recolours/LK_v2/a1_white
				currentTexture = a1
			}
		}
		SUBTYPE
		{
			name = c_grey
			title = #LOC_tantares_variant_tantares_grey
			primaryColor = #595550
			secondaryColor = #663333
			TEXTURE
			{
				texture = Kea_configs/Recolours/LK_v2/a1_grey
				currentTexture = a1
			}
		}
	}
}