// adds the RD-0110M, based on the real RD-0110MD (Methane Demonstrator) engine
// numbers are only slightly made up
+PART[tantares_lv_engine_rd_0110]:NEEDS[TantaresLV,Waterfall]:FIRST
{
	@name = kea_engine_rd_0110m
	@title = Tantares RD-0110M "Gasslekkasje" Rocket Engine
	@description = Some bright young engineers came up with the idea of running an RD-0110 on some newfangled fuel called "Liquid Methane", we're still not sure how it works but it's certainly not certified yet.
	@tags = tantares 0110 soyuz ?ch4 methane
	
	%VABORGANIZER:NEEDS[VABOrganizer]
	{
		%organizerSubcategory = cryogenicEngines
	}
	
	@MODULE[ModuleEnginesFX]
	{
		@maxThrust = 80.29
		
		!PROPELLANT,* {}
		!atmosphereCurve {}
		
		PROPELLANT
		{
			name = LqdMethane
			ratio = 3
			DrawGauge = True
		}
		PROPELLANT
		{
			name = Oxidizer
			ratio = 1
		}
        atmosphereCurve
        {
            key = 0 348.23
            key = 1 247.88
			key = 3 0.001
        }
	}
	
	!EFFECTS {}
	EFFECTS
	{
		running_closed
		{
			AUDIO
            {
                channel = Ship
                clip = TantaresLV/sounds/sound_rocket_normal
                volume = 0.0 0.0
                volume = 0.1 1.0
                volume = 1.0 1.0
                pitch = 0.0 1.0
                pitch = 1.0 1.0
                loop = true
            }
		}
		engage
		{
			AUDIO
			{
				channel = Ship
				clip = sound_vent_soft
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		flameout
		{
			PREFAB_PARTICLE
			{
				prefabName = fx_exhaustSparks_flameout_2
				transformName = nozzleTransform
				oneShot = true
			}
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		disengage
		{
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 0.8
				loop = false
			}
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = rd0110mFX
		engineID = MainNozzles

		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
			responseRateUp = 0.005
			responseRateDown = 0.1
		}
		CONTROLLER
		{
			name = random
			linkedTo = random
			range = 0,1
		}
		// -----------------------------------------------------
		// Past here should be generated with the ingame editor!
		// ------
		TEMPLATE
		{
			templateName = waterfall-methalox-upper-2
			overrideParentTransform = nozzleTransform
			position = 0,0,-0.055
			rotation = 0, 0, 0
			scale = 0.3, 0.3, 0.3
		}
		TEMPLATE
		{
			templateName = waterfall-nozzle-glow-blue-1
			overrideParentTransform = nozzleTransform
			position = 0,0,0
			rotation = 0, 0, 0
			scale = 0.39, 0.39, 0.5
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = rd0110m_vernierFX
		engineID = MainNozzles

		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
			responseRateUp = 0.005
			responseRateDown = 0.1
		}
		CONTROLLER
		{
			name = random
			linkedTo = random
			range = 0,1
		}
		// -----------------------------------------------------
		// Past here should be generated with the ingame editor!
		// ------
		TEMPLATE
		{
			templateName = waterfall-methalox-upper-2
			overrideParentTransform = vernierTransform
			position = 0,0,-0.01
			rotation = 0, 0, 0
			scale = 0.1, 0.1, 0.1
		}
		TEMPLATE
		{
			templateName = waterfall-nozzle-glow-blue-1
			overrideParentTransform = vernierTransform
			position = 0,0,0.018
			rotation = 0, 0, 0
			scale = 0.144, 0.144, 0.15
		}
	}
}

@PART[kea_engine_rd_0110m]:NEEDS[TantaresLV,EngineIgnitor]:FOR[zzzKea_configs]
{
	!MODULE[ModuleEngineIgnitor] {}
	MODULE
	{
		name = ModuleEngineIgnitor
		IgnitionsAvailable = 1
		AutoIgnitionTemperature = 800
		IgnitorType = Internal
		UseUllageSimulation = true
		ChanceWhenUnstable = 0.2
	}
}

