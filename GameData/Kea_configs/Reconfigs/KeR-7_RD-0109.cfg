// kind of completely reconfigures NESD's RD-0109 to better reflect the irl version
@PART[nesdKeR7-rk109]:NEEDS[KeR-7]:FIRST{
	
	@rescaleFactor = 0.867 // 1.875 => 1.625
	@mass = 0.37
	@bulkheadProfiles = size1p3
	@tags ^= :$:soyuz vos* luna zond 0105 0109:
	
	%VABORGANIZER:NEEDS[VABOrganizer]
	{
		%organizerSubcategory = lfoEngines
	}
	
	@MODULE[ModuleEnginesFX]{
		@maxThrust = 13.63 // 25% thrust scaling (54.5 kN)
		
		!atmosphereCurve{}
		%atmosphereCurve
		{
			
			key = 0 323.5
			key = 1 163
			key = 4 0.001
		}
	}
	
	!MODULE[ModuleGimbal] {} // replaced with rcs
	
	MODULE
    {
        name = ModuleRCSFX
        stagingEnabled = False

        showToggles = false

        currentShowToggles = false

        enablePitch = true
        enableYaw = true
        enableRoll = false

        enableX = false
        enableY = false
        enableZ = true
		
		fullThrust = false

        thrusterTransformName = FXside
        thrusterPower = 1

        resourceName = LiquidFuel
        resourceFlowMode = STAGE_PRIORITY_FLOW
        runningEffectName = running_rcs

        PROPELLANT
		{
			name = LiquidFuel
			ratio = 0.9
			DrawGauge = True
			resourceFlowMode = STAGE_PRIORITY_FLOW
		}
		PROPELLANT
		{
			name = Oxidizer
			ratio = 1.1
			resourceFlowMode = STAGE_PRIORITY_FLOW
		}
        atmosphereCurve
        {
            key = 0 260
            key = 1 86
        }
    }
	
	MODULE
	{
		name = ModuleB9PartSwitch
		switcherDescription = Engine Config
		switcherDescriptionPlural = Engine Configs
		moduleID = engineSwitch
		
		SUBTYPE
		{
			name = RD-0105
			title = RD-0105 (8D714)
			descriptionSummary = 
			descriptionDetail = <b>Thrust:</b> 5.55 kN ASL / 12.35 kN Vac.\n<b>Isp:</b> 142 s ASL / 316 s Vac.
			addedMass = 0.01
			
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleEnginesFX
				}

				DATA
				{
					maxThrust = 12.35 // 25% thrust scaling (49.4 kN)
					atmosphereCurve
					{
						key = 0 316
						key = 1 142
						key = 4 0.001
					}
				}
			}
			TRANSFORM // fix RCS transform orientation
			{
				name = FXside
				rotationOffset = 90, 0, 0
			}
		}
		
		SUBTYPE
		{
			name = RD-0109
			title = RD-0109 (8D719)
			descriptionSummary = 
			descriptionDetail = <b>Thrust:</b> 6.87 kN ASL / 13.63 kN Vac.\n<b>Isp:</b> 163 s ASL / 323.5 s Vac.
			defaultSubtypePriority = 10
			
			TRANSFORM // fix RCS transform orientation
			{
				name = FXside
				rotationOffset = 90, 0, 0
			}
		}
	}
}
@PART[nesdKeR7-rk109]:FOR[zzzKea_configs]:NEEDS[KeR-7]
{
	!EFFECTS {}
	!MODULE[ModuleWaterfallFX],* {}
	
	EFFECTS
	{
		running
		{
			AUDIO
            {
                channel = Ship
                clip = TantaresLV/sounds/sound_rocket_normal
                volume = 0.0 0.0
                volume = 0.1 1.0
                volume = 1.0 1.0
                pitch = 0.0 1.0
                pitch = 1.0 1.0
                loop = true
            }
		}
		running_rcs
		{
			AUDIO_MULTI_POOL
			{
				channel = Ship
				transformName = FXside
				clip = sound_rocket_mini
				volume = 0.0 0.0
				volume = 0.1 0.0
				volume = 0.5 0.025
				volume = 1.0 0.1
				pitch = 1.0
				loop = true
			}
		}
		engage
		{
			AUDIO
			{
				channel = Ship
				clip = sound_vent_soft
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		disengage
		{
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 0.8
				loop = false
			}
		}
	}
	
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = RK-109_FX
		engineID = basicEngine

		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = throttle
			linkedTo = throttle
			responseRateUp = 0.005
			responseRateDown = 0.1
		}
		CONTROLLER
		{
			name = random
			linkedTo = random
			range = 0,1
		}
		// -----------------------------------------------------
		// Past here should be generated with the ingame editor!
		// ------
		TEMPLATE
		{
			templateName = waterfall-kerolox-upper-3
			overrideParentTransform = FXmain
			position = 0,0.029,0
			rotation = 90, 0, 0
			scale = 0.9, 0.9, 0.9
		}
		TEMPLATE
		{
			templateName = waterfall-nozzle-glow-yellow-1
			overrideParentTransform = FXmain
			position = 0,0.05,0
			rotation = 90, 0, 0
			scale = 0.46, 0.46, 0.6
		}
	}
	MODULE
	{
		name = ModuleWaterfallFX
		moduleID = RK-109_RCS_FX
		engineID = basicEngine

		CONTROLLER
		{
			name = atmosphereDepth
			linkedTo = atmosphere_density
		}
		CONTROLLER
		{
			name = rcs
			linkedTo = rcs
		}
 
		TEMPLATE
		{
			templateName = stock-rcs-jet-3
			overrideParentTransform = FXside
			position = 0,-0.1,0
			rotation = 0, 0, 180
			scale = 0.6, 0.6, 0.6
		}
	}
}

@PART[nesdKeR7-rk109]:NEEDS[KeR-7,EngineIgnitor]:FOR[zzzKea_configs]
{
	!MODULE[ModuleEngineIgnitor] {}
	MODULE
	{
		name = ModuleEngineIgnitor
		IgnitionsAvailable = 1
		AutoIgnitionTemperature = 500
		IgnitorType = Internal
		UseUllageSimulation = true
		ChanceWhenUnstable = 0.2
	}
}

