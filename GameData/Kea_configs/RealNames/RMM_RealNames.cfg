/////////////////////
// Generic patches //
/////////////////////

@PART[rmm_*]:HAS[#author[EStreetRockets]]:FOR[RocketMotorMenagerie]{
	@manufacturer = Rocketdyne
	@description ^= :'Cotopaxi':SSME:
	@description ^= :'Kilimanjaro':SSME-35:
}


//////////////////////
// Specific patches //
//////////////////////

// SSME-35
@PART[rmm_kilimanjaro]:AFTER[RocketMotorMenagerie]{
	@title = SSME-35
	@description ^= :'Dugong':SSBE:
}
// LRBE
@PART[rmm_arenysaurus]:AFTER[RocketMotorMenagerie]{
	@title = Liquid Rocket Booster Engine
	@description ^= :'Arenysaurus':LRBE:
}
// SSBE
@PART[rmm_dugong]:AFTER[RocketMotorMenagerie]{
	@title = Space Shuttle Booster Engine
	@description ^= :'Dugong':SSBE:
}
// SSME-50
@PART[rmm_osorno]:AFTER[RocketMotorMenagerie]{
	@title = SSME-50
	@description ^= :'Osorno':SSME-50:
}
// SSME-69
@PART[rmm_cotopaxi|rmm_cotopaxi_v]:AFTER[RocketMotorMenagerie]{
	@title = Space Shuttle Main Engine
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch]]{
		@SUBTYPE,* {
			@title ^= :RM-25-69 "Cotopaxi":SSME:
			@descriptionSummary ^= :'Cotopaxi':SSME:
		}
		@SUBTYPE[RS-53]{
			@title = RS-53
			@descriptionSummary ^= :RM-53E "Reventador":RS-53:
		}
	}
}
// SSME-50/150
@PART[rmm_ishtar]:AFTER[RocketMotorMenagerie]{
	@title = SSME-50/150
	@description ^= :'Ishtar':SSME-50/150:
}
// SSME-150
@PART[rmm_ceraunius]:AFTER[RocketMotorMenagerie]{
	@title = SSME-150
	@description ^= :'Ceraunius':SSME-150:
}
// SSME-TMI
@PART[rmm_arsia]:AFTER[RocketMotorMenagerie]{
	@title = SSME-TMI
	@description ^= :'Arsia':SSME-TMI:
	@description ^= :Duna:Mars:
	@description ^= :Mars Transfer Injection:Trans-Mars Injection:
}
// STME
@PART[rmm_rainier]:AFTER[RocketMotorMenagerie]{
	@title = Space Transportation Main Engine
	@description ^= :Cassiopeia Propulsion Systems:Rocketdyne:
	@MODULE[ModuleB9PartSwitch]:HAS[#moduleID[engineSwitch]]{
		@SUBTYPE[STME_common]{
			@title = Sustainer
		}
		@SUBTYPE[STME_booster]{
			@title = Booster
		}
		@SUBTYPE[STME_vac]{
			@title = High Altitude
		}
	}
}
// STBE
@PART[rmm_turiasaurus]:AFTER[RocketMotorMenagerie]{
	@title = Space Transportation Booster Engine
	@description ^= :'Turiasaurus':STBE:
}
// RS-800K
@PART[rmm_wakulla]:AFTER[RocketMotorMenagerie]{
	@title = RS-800K
	@description ^= :Daleth:Delta:
	@description ^= :'Wakulla':RS-800K:
	@description ^= :'Rainier':STME:
}

