// adds engine spooling to all engines that don't already have it and have a thrust above 10kn 
@PART[*]:HAS[@MODULE[ModuleEnginesFX]:HAS[!PROPELLANT[SolidFuel],~useEngineResponseTime[true],#maxThrust[>10]]]:FINAL
{
	@MODULE[ModuleEnginesFX],*
	{
		%useEngineResponseTime = true
		%engineAccelerationSpeed = 2
		%engineDecelerationSpeed = 3
	}
}

